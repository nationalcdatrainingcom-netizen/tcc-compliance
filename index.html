<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TCC Compliance">
<meta name="theme-color" content="#1b6b4a">
<title>TCC Classroom Compliance Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Nunito+Sans:wght@400;500;600;700;800&display=swap">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --brand: #1b6b4a;
  --brand-light: #e8f5ee;
  --brand-dark: #124a33;
  --accent: #d4793a;
  --accent-light: #fdf0e6;
  --danger: #c0392b;
  --danger-light: #fdecea;
  --warning: #e67e22;
  --warning-light: #fef5e7;
  --text: #2c3e3a;
  --text-med: #5a6b66;
  --text-light: #8a9a94;
  --border: #ddd8d0;
  --border-light: #ece8e2;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

html {
  overflow-x: hidden;
  max-width: 100vw;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  max-width: 100vw;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.app-header {
  background: linear-gradient(135deg, #1b6b4a 0%, #1a5740 50%, #1d4a35 100%);
  color: white;
  padding: calc(0.7rem + var(--safe-top)) 1rem 0.7rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(27,107,74,0.25);
}
.app-header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.app-header h1 { font-family: 'Source Serif 4', serif; font-size: 1.1rem; font-weight: 700; }
.app-header h1 span { display: block; font-family: 'Nunito Sans', sans-serif; font-size: 0.65rem; font-weight: 600; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.1rem; }
.header-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
.header-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.45rem 0.8rem;
  border-radius: 8px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 36px;
  display: flex;
  align-items: center;
}
.header-btn:active { background: rgba(255,255,255,0.25); }

.mode-toggle {
  display: flex;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
}
.mode-toggle-btn {
  padding: 0.4rem 0.7rem;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  background: none;
  border: none;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 36px;
  white-space: nowrap;
}
.mode-toggle-btn.active { background: rgba(255,255,255,0.2); color: white; }
.user-badge { font-size: 0.72rem; background: rgba(255,255,255,0.15); padding: 0.3rem 0.7rem; border-radius: 50px; font-weight: 600; color: white; }
.user-badge .ub-role { opacity: 0.7; font-size: 0.62rem; }

/* ===== MAIN ===== */
.main-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1rem;
  padding-bottom: calc(1rem + var(--safe-bottom));
  overflow-x: hidden;
}

/* ===== SETUP ===== */
.setup-screen { max-width: 580px; margin: 0 auto; }
.setup-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-light);
  margin-bottom: 1.2rem;
}
.setup-card-header { background: var(--card); padding: 1.2rem 1.2rem 0.7rem; border-bottom: 2px solid var(--border-light); }
.setup-card-header h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; color: var(--brand-dark); margin-bottom: 0.3rem; }
.setup-card-header .setup-desc { font-size: 0.82rem; color: var(--text-med); line-height: 1.5; }
.setup-card-header .setup-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
.setup-card-body { padding: 1.2rem; }

.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block;
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.3rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 0.75rem 0.9rem;
  border: 2px solid #94a3b8;
  border-radius: 8px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  background: white;
  -webkit-appearance: none;
  appearance: none;
  min-height: 48px;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(27,107,74,0.12);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

.start-btn {
  display: block;
  width: 100%;
  background: var(--brand-dark);
  color: white;
  border: none;
  padding: 0.9rem;
  border-radius: 10px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(18,74,51,0.3);
  margin-top: 1rem;
  min-height: 52px;
}
.start-btn:disabled { opacity: 0.5; }

.prev-checks { margin-top: 1.2rem; }
.prev-checks h3 { font-family: 'Source Serif 4', serif; font-size: 0.95rem; color: var(--text-med); margin-bottom: 0.5rem; }
.prev-check-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 0.9rem;
  background: var(--card);
  border-radius: 8px;
  margin-bottom: 0.4rem;
  border: 1px solid var(--border-light);
  gap: 0.5rem;
}
.prev-check-item .prev-info { font-weight: 700; font-size: 0.85rem; color: var(--text); }
.prev-check-item .prev-meta { font-size: 0.72rem; color: var(--text-light); }
.prev-check-item .prev-pct { font-weight: 800; color: var(--brand); font-size: 0.9rem; }
.prev-resume {
  background: var(--brand-light);
  color: var(--brand);
  border: none;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 36px;
  white-space: nowrap;
}
.prev-resume:active { background: var(--brand); color: white; }

/* ===== CHECKER LAYOUT ===== */
.checker-layout { display: grid; grid-template-columns: 240px 1fr; gap: 1.2rem; align-items: start; }
.sidebar { position: sticky; top: 72px; }
.sidebar-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border-light);
  overflow: hidden;
}
.sidebar-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); padding: 0.7rem 0.9rem 0.3rem; }
.sidebar-info { padding: 0.4rem 0.9rem; border-bottom: 1px solid var(--border-light); font-size: 0.78rem; }
.sidebar-info .si-label { font-size: 0.62rem; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
.sidebar-info .si-value { font-weight: 700; color: var(--text); margin-top: 0.05rem; }
.cat-nav-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 0.9rem;
  cursor: pointer;
  touch-action: manipulation;
  border-left: 3px solid transparent;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-med);
}
.cat-nav-item:active { background: var(--bg); }
.nav-progress { margin-left: auto; font-size: 0.68rem; font-weight: 800; min-width: 30px; text-align: right; }
.nav-progress.complete { color: var(--brand); }
.nav-progress.partial { color: var(--warning); }
.nav-progress.empty { color: var(--text-light); }
.cat-nav-done { background: var(--brand-light); }
.overall-progress { padding: 0.8rem; border-top: 1px solid var(--border-light); }
.overall-label { font-size: 0.65rem; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
.progress-bar-track { height: 8px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--brand), #2ecc71); border-radius: 4px; transition: width 0.4s ease; }
.overall-pct { font-size: 0.75rem; font-weight: 800; color: var(--brand); margin-top: 0.25rem; }
.sidebar-actions { padding: 0.6rem; border-top: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 0.35rem; }
.sidebar-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  width: 100%;
  padding: 0.5rem;
  border-radius: 8px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--text);
  min-height: 40px;
}
.sidebar-btn.primary { background: var(--brand); color: white; border-color: var(--brand); }
.sidebar-btn.primary:active { background: var(--brand-dark); }

/* ===== CLASSROOM HEADER ===== */
.classroom-header {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-light);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  flex-wrap: wrap;
}
.classroom-header h2 { font-family: 'Source Serif 4', serif; font-size: 1.1rem; color: var(--brand-dark); }
.classroom-header .age-badge {
  font-size: 0.68rem;
  font-weight: 800;
  padding: 0.25rem 0.6rem;
  border-radius: 50px;
  background: var(--accent-light);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-top: 0.2rem;
}
.last-inspection { font-size: 0.75rem; color: var(--text-med); margin-top: 0.25rem; }
.last-inspection strong { color: var(--text); }
.classroom-stats { display: flex; gap: 1.2rem; }
.stat-item { text-align: center; }
.stat-num { font-family: 'Source Serif 4', serif; font-size: 1.3rem; font-weight: 700; }
.stat-num.green { color: var(--brand); }
.stat-num.orange { color: var(--warning); }
.stat-num.red { color: var(--danger); }
.stat-label { font-size: 0.62rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.04em; }

/* ===== CATEGORY SECTIONS ===== */
.category-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border-light);
  margin-bottom: 0.8rem;
  overflow: hidden;
}
.category-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.9rem 1rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.category-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.category-title { font-family: 'Source Serif 4', serif; font-size: 0.95rem; font-weight: 700; color: var(--text); flex: 1; }
.category-count { font-size: 0.68rem; font-weight: 800; padding: 0.2rem 0.55rem; border-radius: 50px; min-width: 44px; text-align: center; }
.category-count.all-good { background: var(--brand-light); color: var(--brand); }
.category-count.some-issues { background: var(--warning-light); color: var(--warning); }
.category-count.not-started { background: var(--border-light); color: var(--text-light); }
.category-toggle { font-size: 0.85rem; color: var(--text-light); transition: transform 0.2s; }
.category-toggle.open { transform: rotate(180deg); }
.section-complete { border-left: 4px solid var(--brand); }
.section-complete .category-header { background: var(--brand-light); }
.section-done-badge { display: inline-block; margin-left: 0.5rem; font-family: 'Nunito Sans', sans-serif; font-size: 0.62rem; font-weight: 800; color: var(--brand); background: white; padding: 0.1rem 0.45rem; border-radius: 50px; vertical-align: middle; }
.category-body { border-top: 1px solid var(--border-light); padding: 0.3rem 0; display: none; }
.category-body.open { display: block; }

/* ===== CHECK ITEMS ===== */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 0.7rem;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border-light);
}
.check-item:last-child { border-bottom: none; }
.check-item:active { background: #fafaf8; }
.check-content { flex: 1; min-width: 0; }
.check-text { font-size: 0.84rem; color: var(--text); line-height: 1.5; }
.check-rule { font-size: 0.65rem; color: var(--text-light); margin-top: 0.15rem; font-weight: 700; }
.check-date { color: var(--brand); font-style: italic; }
.check-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
.status-btn {
  width: 42px;
  height: 36px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: white;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  font-size: 0.7rem;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
}
.status-btn.active-pass { background: #16a34a; border-color: #15803d; color: white; box-shadow: 0 2px 8px rgba(22,163,74,0.35); }
.status-btn.active-fail { background: #dc2626; border-color: #b91c1c; color: white; box-shadow: 0 2px 8px rgba(220,38,38,0.35); }
.status-btn.active-na { background: #6b7280; border-color: #4b5563; color: white; }
.check-note { margin-top: 0.4rem; }
.check-note textarea {
  width: 100%;
  padding: 0.5rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  background: var(--bg);
  resize: vertical;
  min-height: 60px;
  -webkit-appearance: none;
}
.check-note textarea:focus { outline: none; border-color: var(--brand); background: white; }
.note-toggle { font-size: 0.7rem; color: var(--text-light); cursor: pointer; margin-top: 0.3rem; font-weight: 700; touch-action: manipulation; }
.fail-needs-note { background: #fef8f8 !important; border-left: 3px solid var(--danger); }
.note-required textarea { border-color: var(--danger) !important; }
.note-required-label { font-size: 0.68rem; font-weight: 800; color: var(--danger); margin-top: 0.2rem; }
.print-note { display: none; font-size: 0.75rem; color: var(--text-med); margin-top: 0.2rem; font-style: italic; }
.print-status { display: none; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; padding: 0.12rem 0.45rem; border-radius: 3px; margin-left: 0.4rem; vertical-align: middle; }
.print-status.ps-pass { background: #d4edda; color: #155724; border: 1px solid #b1dfbb; }
.print-status.ps-fail { background: #f8d7da; color: #721c24; border: 1px solid #f1b0b7; }
.print-status.ps-na { background: #e2e3e5; color: #495057; border: 1px solid #cbccce; }
.print-status.ps-unchecked { background: #fff3cd; color: #856404; border: 1px solid #ffd964; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal-card {
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.5rem calc(1.5rem + var(--safe-bottom));
  width: 100%;
  max-width: 560px;
  box-shadow: var(--shadow-lg);
  max-height: 85vh;
  overflow-y: auto;
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; }
.modal-card h3 { font-family: 'Source Serif 4', serif; font-size: 1.1rem; color: var(--brand-dark); margin-bottom: 0.3rem; }
.modal-card .modal-desc { font-size: 0.82rem; color: var(--text-med); margin-bottom: 1rem; }
.modal-btns { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
.modal-btn {
  width: 100%;
  padding: 0.85rem;
  border-radius: 12px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
  border: none;
  background: #f1f5f9;
  color: var(--text);
  min-height: 52px;
}
.modal-btn.primary { background: var(--brand); color: white; }
.modal-btn.danger { background: #dc2626; color: white; }
.modal-btn:active { opacity: 0.85; }

/* ===== LOGIN ===== */
.login-screen { max-width: 400px; margin: 1.5rem auto; }
.login-card { background: var(--card); border-radius: 16px; padding: 2rem 1.5rem; box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); text-align: center; }
.login-icon { font-size: 2.5rem; margin-bottom: 0.4rem; }
.login-card h2 { font-family: 'Source Serif 4', serif; font-size: 1.3rem; color: var(--brand-dark); margin-bottom: 0.25rem; }
.login-desc { font-size: 0.82rem; color: var(--text-med); margin-bottom: 1.3rem; }
.pin-input { text-align: center; letter-spacing: 0.5em; font-size: 1.3rem; font-weight: 800; }
.login-btn { display: block; width: 100%; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: white; border: none; padding: 0.9rem; border-radius: 10px; font-family: 'Nunito Sans', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; touch-action: manipulation; margin-top: 0.5rem; min-height: 52px; }
.login-btn:active { opacity: 0.85; }
.login-error { background: var(--danger-light); color: var(--danger); font-size: 0.82rem; font-weight: 700; padding: 0.5rem 0.8rem; border-radius: 8px; margin-top: 0.7rem; display: none; }

/* ===== DASHBOARD STATS ===== */
.d-stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.8rem; margin-bottom: 1.2rem; }
.d-stat-card { background: var(--card); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); border: 1px solid var(--border-light); text-align: center; }
.sc-num { font-family: 'Source Serif 4', serif; font-size: 1.8rem; font-weight: 700; color: var(--brand); }
.sc-num.orange { color: var(--warning); }
.sc-num.red { color: var(--danger); }
.sc-label { font-size: 0.65rem; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.15rem; }

/* ===== DASHBOARD TABS ===== */
.dash-tab-bar { display: flex; gap: 0; background: var(--border-light); border-radius: 12px; padding: 3px; margin-bottom: 1rem; }
.dash-tab { flex: 1; padding: 0.6rem 0.5rem; border: none; background: transparent; border-radius: 10px; cursor: pointer; touch-action: manipulation; font-size: 0.78rem; font-weight: 700; color: var(--text-light); display: flex; flex-direction: column; align-items: center; gap: 2px; }
.dash-tab.active { background: var(--brand); color: white; box-shadow: 0 2px 8px rgba(27,107,74,0.25); }
.dash-tab-sub { font-size: 0.6rem; font-weight: 600; opacity: 0.7; }

/* ===== MONTH NAV ===== */
.month-nav { display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: var(--radius); padding: 0.7rem 0.9rem; margin-bottom: 1rem; box-shadow: var(--shadow); border: 1px solid var(--border-light); }
.month-nav-center { text-align: center; flex: 1; padding: 0 0.5rem; }
.month-nav-label { font-family: 'Source Serif 4', serif; font-size: 1rem; font-weight: 700; color: var(--brand-dark); }
.month-nav-sub { font-size: 0.65rem; color: var(--text-light); margin-top: 0.05rem; }
.month-current-badge { display: inline-block; background: var(--brand-light); color: var(--brand); font-weight: 800; font-size: 0.58rem; padding: 0.1rem 0.45rem; border-radius: 50px; margin-left: 0.3rem; text-transform: uppercase; }

// ===== CLOUD SYNC =====
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxi4CN5azmrYTMF1eyvo3eG25GU_4mlgtnVanA00nEOyhXDu-qRUV-TGeWt_BFyqFNA/exec';
var _cloudLoading=false, _cloudError='', _cloudSynced=false;
function _genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9);}
function cloudPost(submission, tab){
  if(!SCRIPT_URL)return;
  fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({tab:tab||'compliance',data:submission})}).catch(function(){});
}
function cloudLoad(callback){
  if(!SCRIPT_URL){_cloudLoading=false;if(callback)callback([]);return;}
  _cloudLoading=true;_cloudError='';render();
  fetch(SCRIPT_URL+'?tab=compliance').then(function(r){return r.json();}).then(function(rows){
    _cloudLoading=false;
    var raw=Array.isArray(rows)?rows:[];
    var arr=[];
    raw.forEach(function(row){
      if(!row)return;
      if(row._id||row.centerId){arr.push(row);return;}
      var jsonStr=row['JSON Data']||row['json_data']||row['data']||row['JSON_Data']||'';
      if(!jsonStr&&Array.isArray(row)){jsonStr=row[row.length-1]||'';}
      if(jsonStr){
        try{
          var parsed=typeof jsonStr==='string'?JSON.parse(jsonStr):jsonStr;
          if(parsed&&(parsed._id||parsed.centerId))arr.push(parsed);
        }catch(e){}
      }
    });
    var localIds={};(state.submissions||[]).forEach(function(s){if(s._id)localIds[s._id]=true;});
    var added=0;
    arr.forEach(function(s){
      if(s._id&&!localIds[s._id]){state.submissions.push(s);localIds[s._id]=true;added++;}
      else if(!s._id){
        var dupKey=(s.centerId||'')+'::'+( s.classroomId||'')+'::'+( s.inspectionDate||'')+'::'+( s.teacherName||'');
        if(!localIds[dupKey]){s._id=dupKey;state.submissions.push(s);localIds[dupKey]=true;added++;}
      }
    });
    if(added>0)saveState();
    _cloudSynced=true;if(callback)callback(arr);render();
  }).catch(function(e){
    _cloudLoading=false;_cloudError='Could not connect to cloud. Showing local data only.';
    _cloudSynced=true;if(callback)callback([]);render();
  });
}

// ===== HELPERS =====
function getKey(){return state.centerId+'::'+state.classroomId+'::'+state.teacherName.trim().toLowerCase();}
function getData(){var k=getKey();if(!state.allData[k])state.allData[k]={checks:{},notes:{},checkDates:{}};return state.allData[k];}
function getCenter(){return CENTERS.find(function(c){return c.id===state.centerId;});}
function getClassroom(){var c=getCenter();if(!c)return null;return c.classrooms.find(function(r){return r.id===state.classroomId;});}
function getFilteredItems(cat,ages){return cat.items.filter(function(i){if(!i.ageFilter)return true;return i.ageFilter.some(function(a){return ages.indexOf(a)!==-1;});});}
function getAgesLabel(a){var m={infant:'Infant',toddler:'Toddler',preschool:'Preschool','school-age':'School-Age'};return a.map(function(x){return m[x]||x;}).join(' / ');}
function getCounts(d,ages){var p=0,f=0,n=0,t=0;CATEGORIES.forEach(function(cat){getFilteredItems(cat,ages).forEach(function(i){t++;var v=d.checks[i.id];if(v==='pass')p++;else if(v==='fail')f++;else if(v==='na')n++;});});return{pass:p,fail:f,na:n,unchecked:t-p-f-n,total:t};}
function getProgress(d,ages){var c=getCounts(d,ages);return c.total===0?0:Math.round(((c.pass+c.fail+c.na)/c.total)*100);}
function formatDate(d){if(!d)return '—';var p=d.split('-');if(p.length!==3)return d;return p[1]+'/'+p[2]+'/'+p[0];}

// ===== CHECKER =====
function renderChecker(){
  var room=getClassroom(),center=getCenter();if(!room||!center)return'';
  var data=getData(),counts=getCounts(data,room.ages),pct=getProgress(data,room.ages);
  var ph='<div class="print-report-header"><h2 style="font-family:Source Serif 4,serif;font-size:1.4rem;color:var(--brand-dark);margin:0;">Classroom Self-Inspection Report</h2><div style="font-size:0.85rem;color:var(--text-med);">'+center.name+'</div></div>';
  var hd=ph+'<div class="classroom-header"><div><h2>'+room.name+'</h2><span class="age-badge">'+getAgesLabel(room.ages)+'</span><div class="last-inspection">Inspector: <strong>'+(state.teacherName||'')+'</strong> &nbsp;·&nbsp; Date: <strong>'+formatDate(state.inspectionDate)+'</strong></div></div><div class="classroom-stats"><div class="stat-item"><div class="stat-num green">'+counts.pass+'</div><div class="stat-label">Pass</div></div><div class="stat-item"><div class="stat-num red">'+counts.fail+'</div><div class="stat-label">Fail</div></div><div class="stat-item"><div class="stat-num orange">'+counts.unchecked+'</div><div class="stat-label">Left</div></div></div></div>';
  var catNav=CATEGORIES.map(function(cat){var items=getFilteredItems(cat,room.ages);if(items.length===0)return'';var ck=0;items.forEach(function(i){if(data.checks[i.id])ck++;});var np=Math.round((ck/items.length)*100),pc=np>=100?'complete':(np>0?'partial':'empty');return '<div class="cat-nav-item'+(np>=100?' cat-nav-done':'')+'" onclick="scrollToCat(\''+cat.id+'\')">'+cat.icon+' '+cat.title+'<span class="nav-progress '+pc+'">'+(np>=100?'✓':np+'%')+'</span></div>';}).join('');
  var sb='<div class="sidebar no-print"><div class="sidebar-card"><div class="sidebar-title">Inspection Info</div><div class="sidebar-info"><div class="si-label">Center</div><div class="si-value">'+center.name+'</div></div><div class="sidebar-info"><div class="si-label">Classroom</div><div class="si-value">'+room.name+'</div></div>'+catNav+'<div class="overall-progress"><div class="overall-label">Progress</div><div class="progress-bar-track"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div><div class="overall-pct">'+pct+'% Complete</div></div><div class="sidebar-actions"><button class="sidebar-btn primary" onclick="submitToDashboard()">✅ Submit</button><button class="sidebar-btn" onclick="backToSetup()">← Back</button></div></div></div>';
  var cats=CATEGORIES.map(function(cat){
    var fi=getFilteredItems(cat,room.ages);if(fi.length===0)return'';
    var isO=state.openCategories[cat.id],cp=0,cc=0;
    fi.forEach(function(i){var v=data.checks[i.id];if(v==='pass'){cp++;cc++;}else if(v==='fail'||v==='na')cc++;});
    var ccl=cc===0?'not-started':(cp===fi.length?'all-good':'some-issues');
    var isSectionComplete=cc===fi.length;
    var ih=fi.map(function(item){
      var val=data.checks[item.id]||'',note=data.notes[item.id]||'',cd=data.checkDates?data.checkDates[item.id]||'':'',hn=note.length>0,showNote=hn||(val==='fail');
      var missingNote=val==='fail'&&(!note||!note.trim());
      var sb2='';if(val==='pass')sb2='<span class="print-status ps-pass">✓ Pass</span>';else if(val==='fail')sb2='<span class="print-status ps-fail">✗ Fail</span>';else if(val==='na')sb2='<span class="print-status ps-na">N/A</span>';else sb2='<span class="print-status ps-unchecked">— Unchecked</span>';
      return '<div class="check-item'+(missingNote?' fail-needs-note':'')+'"><div class="check-content"><div class="check-text">'+item.text+sb2+'</div><div class="check-rule">'+item.rule+(cd?' · <span class="check-date">'+cd+'</span>':'')+'</div>'+(note&&note.trim()?'<div class="print-note">📝 '+note.trim().replace(/</g,'&lt;')+'</div>':'')+(showNote?'<div class="check-note'+(missingNote?' note-required':'')+'"><textarea id="note-'+item.id+'" placeholder="'+(val==='fail'?'Required: Describe the issue...':'Add a note...')+'" oninput="updateNote(\''+item.id+'\',this.value)">'+note.replace(/</g,'&lt;')+'</textarea>'+(missingNote?'<div class="note-required-label">⚠ Note required for failed items</div>':'')+'</div>':'<div class="note-toggle" onclick="toggleNote(\''+item.id+'\')">+ Add note</div>')+'</div><div class="check-actions"><button class="status-btn'+(val==='pass'?' active-pass':'')+'" onclick="setCheck(\''+item.id+'\',\'pass\')">✓</button><button class="status-btn'+(val==='fail'?' active-fail':'')+'" onclick="setCheck(\''+item.id+'\',\'fail\')">✗</button><button class="status-btn'+(val==='na'?' active-na':'')+'" onclick="setCheck(\''+item.id+'\',\'na\')">N/A</button></div></div>';
    }).join('');
    return '<div class="category-section'+(isSectionComplete&&!isO?' section-complete':'')+'" id="cat-'+cat.id+'"><div class="category-header" onclick="toggleCategory(\''+cat.id+'\')"><div class="category-icon" style="background:'+cat.color+'18;color:'+cat.color+'">'+cat.icon+'</div><div class="category-title">'+cat.title+(isSectionComplete&&!isO?'<span class="section-done-badge">✓ Done</span>':'')+'</div><div class="category-count '+ccl+'">'+cc+'/'+fi.length+'</div><div class="category-toggle '+(isO?'open':'')+'">▼</div></div><div class="category-body'+(isO?' open':'')+'">'+ih+'</div></div>';
  }).join('');
  return '<div class="checker-layout">'+sb+'<div class="checker-main">'+hd+cats+'</div></div>';
}

function setCheck(itemId,value){
  var d=getData();
  if(!d.checkDates)d.checkDates={};
  if(d.checks[itemId]===value){delete d.checks[itemId];delete d.checkDates[itemId];saveState();render();return;}
  if(value==='fail'&&(!d.notes[itemId]||!d.notes[itemId].trim())){
    d.notes[itemId]=d.notes[itemId]||' ';
    d.checks[itemId]=value;d.checkDates[itemId]=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
    saveState();render();
    setTimeout(function(){var el=document.getElementById('note-'+itemId);if(el){el.focus();}},60);return;
  }
  d.checks[itemId]=value;d.checkDates[itemId]=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
  var room=getClassroom();
  if(room){
    var changedCat=null;
    CATEGORIES.forEach(function(cat){getFilteredItems(cat,room.ages).forEach(function(i){if(i.id===itemId)changedCat=cat;});});
    if(changedCat){
      var fi=getFilteredItems(changedCat,room.ages);
      var allDone=fi.every(function(i){return d.checks[i.id]==='pass'||d.checks[i.id]==='fail'||d.checks[i.id]==='na';});
      if(allDone){
        _skipScrollRestore=true;
        state.openCategories[changedCat.id]=false;
        for(var ci=0;ci<CATEGORIES.length;ci++){
          var nc=CATEGORIES[ci];var nfi=getFilteredItems(nc,room.ages);if(nfi.length===0)continue;
          var ncDone=nfi.every(function(i){return d.checks[i.id]==='pass'||d.checks[i.id]==='fail'||d.checks[i.id]==='na';});
          if(!ncDone){state.openCategories[nc.id]=true;var ncId=nc.id;setTimeout(function(){var el=document.getElementById('cat-'+ncId);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);break;}
        }
      }
    }
  }
  saveState();render();
}

function submitToDashboard(){
  var room=getClassroom(),center=getCenter(),data=getData();
  if(!room||!center)return;
  var pct=getProgress(data,room.ages);
  if(pct<100){
    showModal('<div class="modal-handle"></div><h3>⚠ Inspection Incomplete</h3><p class="modal-desc">Your self-inspection is <strong>'+pct+'% complete</strong>. All items must be marked Pass, Fail, or N/A before submitting.</p><div class="modal-btns"><button class="modal-btn" onclick="closeModal()">Go Back & Complete</button></div>');return;
  }
  var missing=[];CATEGORIES.forEach(function(cat){getFilteredItems(cat,room.ages).forEach(function(item){if(data.checks[item.id]==='fail'&&(!data.notes[item.id]||!data.notes[item.id].trim()))missing.push(item.text);});});
  if(missing.length>0){
    showModal('<div class="modal-handle"></div><h3>⚠ Notes Required</h3><p class="modal-desc">These failed items need notes:</p><ul style="font-size:0.82rem;color:var(--danger);margin:0.5rem 0 1rem 1.2rem;line-height:1.8;">'+missing.map(function(m){return '<li>'+m+'</li>';}).join('')+'</ul><div class="modal-btns"><button class="modal-btn" onclick="closeModal()">Go Back & Add Notes</button></div>');return;
  }
  var counts=getCounts(data,room.ages);
  showModal('<div class="modal-handle"></div><h3>📋 Submit Self-Inspection</h3><p class="modal-desc">Submit inspection for <strong>'+room.name+'</strong> at <strong>'+center.name+'</strong>.</p><div style="background:var(--brand-light);border-radius:8px;padding:0.7rem 1rem;margin:0.8rem 0;font-size:0.85rem;"><strong>Summary:</strong> Pass: <span style="color:var(--brand);font-weight:800;">'+counts.pass+'</span> · Fail: <span style="color:var(--danger);font-weight:800;">'+counts.fail+'</span> · N/A: '+counts.na+'</div><p class="modal-desc" style="font-size:0.78rem;">Once submitted, this will appear on the Dashboard and your workspace will be cleared for the next teacher.</p><div class="modal-btns"><button class="modal-btn primary" onclick="doSubmit()">Submit →</button><button class="modal-btn" onclick="closeModal()">Cancel</button></div>');
}

function doSubmit(){

function dashNextMonth(){var cur=getDashCurrentMonth();var p=dashViewMonth.split('-');var y=parseInt(p[0]),m=parseInt(p[1])+1;if(m>12){m=1;y++;}var next=y+'-'+String(m).padStart(2,'0');if(next>cur)return;dashViewMonth=next;render();}

function getDashCurrentQuarter(){var d=new Date();var q=Math.ceil((d.getMonth()+1)/3);return d.getFullYear()+'-Q'+q;}
function getSubQuarter(sub){var d=sub.inspectionDate||sub.submittedDate||'';if(!d)return '';var parts=d.split(/[-\/]/);var y,m;if(parts[0].length===4){y=parseInt(parts[0]);m=parseInt(parts[1]);}else{y=parseInt(parts[2]);m=parseInt(parts[0]);}var q=Math.ceil(m/3);return y+'-Q'+q;}
function getQuarterLabel(yq){if(!yq)return '';var parts=yq.split('-Q');var q=parseInt(parts[1]);var names=['','Jan–Mar','Apr–Jun','Jul–Sep','Oct–Dec'];return names[q]+' '+parts[0]+' (Q'+q+')';}
function getDashAvailableQuarters(){var qs={};(state.submissions||[]).forEach(function(s){if(s.type!=='admin')return;var q=getSubQuarter(s);if(q)qs[q]=true;});return Object.keys(qs).sort().reverse();}
function dashSetQuarter(q){dashViewQuarter=q;render();}
function dashPrevQuarter(){var parts=dashViewQuarter.split('-Q');var y=parseInt(parts[0]);var q=parseInt(parts[1]);q--;if(q<1){q=4;y--;}dashViewQuarter=y+'-Q'+q;render();}
function dashNextQuarter(){var parts=dashViewQuarter.split('-Q');var y=parseInt(parts[0]);var q=parseInt(parts[1]);q++;if(q>4){q=1;y++;}dashViewQuarter=y+'-Q'+q;render();}
function isDashCurrentQuarter(yq){return yq===getDashCurrentQuarter();}

function dashDoLogin(){
  var uid=document.getElementById('dashLoginUser').value;
  var pin=document.getElementById('dashLoginPin').value;
  var err=document.getElementById('dashLoginError');
  if(!uid){err.textContent='Please select your name.';err.style.display='block';return;}
  var user=USERS.find(function(u){return u.id===uid;});
  if(!user){err.textContent='User not found.';err.style.display='block';return;}
  if(pin!==user.pin){err.textContent='Incorrect PIN. Please try again.';err.style.display='block';document.getElementById('dashLoginPin').value='';document.getElementById('dashLoginPin').focus();return;}
  dashUser=user;dashFilterCenter='';dashViewMonth=getDashCurrentMonth();dashExpandedRows={};
  try{localStorage.setItem('mi_cc_dash_user',user.id);}catch(e){}
  _cloudSynced=false;_lastSyncTime='';cloudLoad(function(){_lastSyncTime=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});render();});render();
}
function dashLogout(){dashUser=null;try{localStorage.removeItem('mi_cc_dash_user');}catch(e){}render();}

function renderDashboard(){
  if(!dashUser)return renderDashLogin();
  var syncBar='';
  if(_cloudLoading){return '<div style="text-align:center;padding:3rem;"><div style="font-size:2rem;margin-bottom:0.5rem;">☁️</div><div style="font-size:1rem;color:var(--brand);">Loading from cloud...</div></div>';}
  if(_cloudError){syncBar='<div style="background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:0.5rem 1rem;margin-bottom:1rem;font-size:0.78rem;color:#92400e;">⚠️ '+_cloudError+' <button onclick="refreshDash()" style="margin-left:0.5rem;background:#f59e0b;color:white;border:none;border-radius:6px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:800;cursor:pointer;">↺ Retry</button></div>';}
  else if(SCRIPT_URL&&_cloudSynced){var lastSync=_lastSyncTime?(' · '+_lastSyncTime):'';syncBar='<div style="text-align:right;font-size:0.62rem;color:var(--text-light);margin-bottom:0.5rem;">☁️ Synced with cloud'+lastSync+' <button onclick="refreshDash()" style="margin-left:0.5rem;background:var(--brand-light);color:var(--brand);border:1px solid var(--brand);border-radius:6px;padding:0.15rem 0.5rem;font-size:0.65rem;font-weight:800;cursor:pointer;">↺ Refresh</button></div>';}
  return syncBar+renderDashMain();
}

  // Only show users who have dashboard access (owners, directors, assistants)
  var dashEligible = USERS.filter(function(u){return u.role==='owner'||u.role==='director'||u.role==='assistant';});
  var opts=dashEligible.map(function(u){return '<option value="'+u.id+'">'+u.name+' — '+getDashRoleLabel(u.role)+' ('+getDashCenterNames(u)+')</option>';}).join('');

function renderDashCenterFilter(){
  var uc=dashUser.centers;if(uc.length<=1)return '';
  var opts=uc.map(function(cid){var c=CENTERS.find(function(x){return x.id===cid;});if(!c)return '';return '<option value="'+c.id+'"'+(dashFilterCenter===c.id?' selected':'')+'>'+c.name+'</option>';}).join('');
  return '<div class="d-filter-bar"><label>Filter:</label><select onchange="dashSetFilter(this.value)"><option value="">All My Centers</option>'+opts+'</select></div>';
}

function renderDashMain(){
  var tabBar='<div class="dash-tab-bar"><button class="dash-tab'+(dashViewTab==='classroom'?' active':'')+'" onclick="dashSetTab(\'classroom\')">📋 Classroom<span class="dash-tab-sub">Monthly</span></button><button class="dash-tab'+(dashViewTab==='admin'?' active':'')+'" onclick="dashSetTab(\'admin\')">🏢 Administrative<span class="dash-tab-sub">Quarterly</span></button></div>';
  return tabBar+(dashViewTab==='admin'?renderDashAdminTab():renderDashClassroomTab());
}

function renderDashClassroomTab(){
  var subs=state.submissions||[];var curMonth=getDashCurrentMonth();var isCurrent=isDashCurrentMonth(dashViewMonth);var canGoNext=dashViewMonth<curMonth;
  var monthNav='<div class="month-nav"><button class="month-btn" onclick="dashPrevMonth()">← Prev</button><div class="month-nav-center"><div class="month-nav-label">'+getDashMonthLabel(dashViewMonth)+(isCurrent?'<span class="month-current-badge">Current</span>':'')+'</div><div class="month-nav-sub">'+(isCurrent?"This month's submissions":"Past records")+'</div></div><button class="month-btn" onclick="dashNextMonth()"'+(canGoNext?'':' disabled')+'>Next →</button></div>';
  var avail=getDashAvailableMonths();var past=avail.filter(function(m){return m<curMonth;});
  var chips='';if(past.length>0||!isCurrent){chips='<div class="prev-months-bar"><span class="prev-months-label">Jump:</span><span class="prev-month-chip'+(isCurrent?' active':'')+'" onclick="dashSetMonth(\''+curMonth+'\')">'+getDashMonthLabel(curMonth)+'</span>';past.forEach(function(m){chips+='<span class="prev-month-chip'+(dashViewMonth===m?' active':'')+'" onclick="dashSetMonth(\''+m+'\')">'+getDashMonthLabel(m)+'</span>';});chips+='</div>';}
  var inspections=[];
  subs.forEach(function(sub,idx){
    if(sub.type==='admin')return;var subMonth=getSubMonth(sub);if(subMonth!==dashViewMonth)return;
    var ctr=CENTERS.find(function(c){return c.id===sub.centerId;}),rm=ctr?ctr.classrooms.find(function(c){return c.id===sub.classroomId;}):null;
    if(!ctr||!rm)return;if(!dashCanSeeCenter(ctr.id))return;if(dashFilterCenter&&ctr.id!==dashFilterCenter)return;
    var ages=sub.ages||rm.ages;var failItems=[];
    CATEGORIES.forEach(function(cat){getFilteredItems(cat,ages).forEach(function(item){if(sub.checks[item.id]==='fail')failItems.push({text:item.text,rule:item.rule,note:(sub.notes[item.id]||'').trim()});});});
    inspections.push({idx:idx,center:sub.centerName||ctr.name,centerId:ctr.id,classroom:sub.classroomName||rm.name,classroomId:sub.classroomId,ages:getAgesLabel(ages),teacher:sub.teacherName||'Unknown',date:sub.inspectionDate||'',submittedDate:sub.submittedDate||'',submittedTime:sub.submittedTime||'',pct:sub.completion||0,counts:{pass:sub.pass||0,fail:sub.fail||0,na:sub.na||0},failItems:failItems});
  });
  inspections.sort(function(a,b){return a.center!==b.center?a.center.localeCompare(b.center):a.classroom.localeCompare(b.classroom);});
  var totalFails=inspections.reduce(function(s,i){return s+i.counts.fail;},0);
  var totalClassrooms=0;CENTERS.forEach(function(c){if(dashCanSeeCenter(c.id)&&(!dashFilterCenter||c.id===dashFilterCenter))totalClassrooms+=c.classrooms.length;});
  var uniqRm={};inspections.forEach(function(i){uniqRm[i.centerId+'::'+i.classroomId]=true;});
  var reported=Object.keys(uniqRm).length;var awaiting=totalClassrooms-reported;
  var stats='<div class="d-stats-row"><div class="d-stat-card"><div class="sc-num">'+inspections.length+'</div><div class="sc-label">Submissions</div></div><div class="d-stat-card"><div class="sc-num">'+reported+'</div><div class="sc-label">Reported</div></div><div class="d-stat-card"><div class="sc-num'+(awaiting>0?' orange':'')+'">'+awaiting+'</div><div class="sc-label">Awaiting</div></div><div class="d-stat-card"><div class="sc-num'+(totalFails>0?' red':'')+'">'+totalFails+'</div><div class="sc-label">Failed Items</div></div></div>';
  if(inspections.length===0){return monthNav+chips+stats+renderDashCenterFilter()+'<div class="d-table-card"><div class="d-empty-state"><div class="es-icon">📋</div><div class="es-title">No submissions yet</div><div class="es-desc">'+(isCurrent?'Inspections will appear here as teachers submit them.':'No records for '+getDashMonthLabel(dashViewMonth)+'.')+'</div></div></div>';}
  var rows=inspections.map(function(ins){
    var pc=ins.pct>=100?'pct-complete':(ins.pct>0?'pct-partial':'pct-empty');var hd=ins.failItems.length>0;var isE=dashExpandedRows['s-'+ins.idx];
    var row='<tr><td class="td-center">'+ins.center+'</td><td class="td-classroom">'+ins.classroom+'<br><span style="font-size:0.68rem;color:var(--text-light);">'+ins.ages+'</span></td><td class="td-teacher">'+ins.teacher+'</td><td>'+formatDate(ins.date)+'</td><td class="d-sent-date">'+ins.submittedDate+'<br>'+ins.submittedTime+'</td><td><span class="pct-badge '+pc+'">'+ins.pct+'%</span></td><td class="d-pass-fail"><span class="pf-pass">'+ins.counts.pass+'P</span>/<span class="pf-fail">'+ins.counts.fail+'F</span></td><td>'+(hd?'<button class="d-expand-btn" onclick="dashToggleRow(\'s-'+ins.idx+'\')">'+(isE?'▲ Hide':'▼ '+ins.failItems.length+'F')+'</button>':'<span style="font-size:0.72rem;color:var(--brand);">✓ Clean</span>')+'</td></tr>';
    if(isE&&hd){var fh=ins.failItems.map(function(fi){return '<div class="dc-fail-item"><div class="dc-fail-text">'+fi.text+' <span style="font-weight:400;color:var(--text-light);">('+fi.rule+')</span></div>'+(fi.note?'<div class="dc-note">📝 '+fi.note+'</div>':'')+'</div>';}).join('');row+='<tr class="d-detail-row"><td colspan="8"><div class="d-detail-content"><div class="dc-title">Failed Items</div>'+fh+'</div></td></tr>';}
    return row;
  }).join('');
  return monthNav+chips+stats+renderDashCenterFilter()+'<div class="d-table-card"><table><thead><tr><th>Center</th><th>Classroom</th><th>Inspector</th><th>Date</th><th>Submitted</th><th>%</th><th>P/F</th><th>Details</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderDashAdminTab(){
  var subs=state.submissions||[];var curQ=getDashCurrentQuarter();var isCurrent=isDashCurrentQuarter(dashViewQuarter);var canGoNext=dashViewQuarter<curQ;
  var qNav='<div class="month-nav"><button class="month-btn" onclick="dashPrevQuarter()">← Prev</button><div class="month-nav-center"><div class="month-nav-label">'+getQuarterLabel(dashViewQuarter)+(isCurrent?'<span class="month-current-badge">Current</span>':'')+'</div><div class="month-nav-sub">'+(isCurrent?"This quarter's inspections":"Past records")+'</div></div><button class="month-btn" onclick="dashNextQuarter()"'+(canGoNext?'':' disabled')+'>Next →</button></div>';
  var avail=getDashAvailableQuarters();var pastQ=avail.filter(function(q){return q<curQ;});
  var chips='';if(pastQ.length>0||!isCurrent){chips='<div class="prev-months-bar"><span class="prev-months-label">Jump:</span><span class="prev-month-chip'+(isCurrent?' active':'')+'" onclick="dashSetQuarter(\''+curQ+'\')">'+getQuarterLabel(curQ)+'</span>';pastQ.forEach(function(q){chips+='<span class="prev-month-chip'+(dashViewQuarter===q?' active':'')+'" onclick="dashSetQuarter(\''+q+'\')">'+getQuarterLabel(q)+'</span>';});chips+='</div>';}

  // Get admin submissions for this quarter
  var adminSubs = subs.filter(function(sub){
    if(sub.type!=='admin')return false;
    var subQ=getSubQuarter(sub);if(subQ!==dashViewQuarter)return false;
    if(!dashCanSeeCenter(sub.centerId))return false;
    if(dashFilterCenter&&sub.centerId!==dashFilterCenter)return false;
    return true;
  });

  // Build sign-off status per center
  var myCenters=[];CENTERS.forEach(function(c){if(dashCanSeeCenter(c.id)&&(!dashFilterCenter||c.id===dashFilterCenter))myCenters.push(c);});

  // The three contributor roles
  var contributorRoles = [
    { role: 'records', label: "Children's Records", defaultPerson: 'Kelsey Wardlaw' },
    { role: 'hr', label: 'Staff Records & Qualifications', defaultPerson: 'Amy Gutierrez' },
    { role: 'director', label: 'Program Director', defaultPerson: null }
  ];

  var totalFails = 0;
  var totalSignoffs = 0;
  var totalPossibleSignoffs = myCenters.length * 3; // 3 roles per center

  var centerCards = myCenters.map(function(c) {
    var centerSubs = adminSubs.filter(function(s) { return s.centerId === c.id; });

    // Find which center director would be expected
    var directorUser = USERS.find(function(u) {
      return (u.role === 'director' || u.role === 'assistant') && u.centers.indexOf(c.id) !== -1;
    });
    var directorName = directorUser ? directorUser.name : 'Director';

    var signoffCards = contributorRoles.map(function(cr) {
      var matchingSub = null;
      // Find a submission for this center+role in this quarter
      centerSubs.forEach(function(s) {
        if (s.adminRole === cr.role) matchingSub = s;
        // Legacy submissions without adminRole — treat as director
        if (!s.adminRole && cr.role === 'director') matchingSub = s;
      });

      var person = cr.defaultPerson || directorName;
      if (matchingSub) {
        totalSignoffs++;
        var fails = matchingSub.fail || 0;
        totalFails += fails;
        return '<div class="signoff-card signed"><div class="signoff-icon">✅</div><div class="signoff-info"><div class="signoff-name">' + person + '</div><div class="signoff-detail">' + cr.label + ' · ' + formatDate(matchingSub.inspectionDate) + (fails > 0 ? ' · <span class="acc-fails">' + fails + ' failed</span>' : ' · <span class="acc-clean">✓ Clean</span>') + '</div></div><span class="signoff-badge done">' + (matchingSub.completion || 100) + '%</span></div>';
      } else {
        return '<div class="signoff-card pending"><div class="signoff-icon">🕑</div><div class="signoff-info"><div class="signoff-name">' + person + '</div><div class="signoff-detail">' + cr.label + ' · ' + (isCurrent ? 'Not yet completed' : 'No record') + '</div></div><span class="signoff-badge waiting">Pending</span></div>';
      }
    }).join('');

    var allSigned = centerSubs.length >= 3 || (contributorRoles.every(function(cr) {
      return centerSubs.some(function(s) { return s.adminRole === cr.role || (!s.adminRole && cr.role === 'director'); });
    }));

    return '<div class="admin-centers-section"><h3 class="admin-section-title">' + (allSigned ? '✅' : '🏢') + ' ' + c.name + '</h3>' + signoffCards + '</div>';
  }).join('');

  var numAwaiting = totalPossibleSignoffs - totalSignoffs;
  var stats = '<div class="d-stats-row"><div class="d-stat-card"><div class="sc-num">' + totalSignoffs + '</div><div class="sc-label">Sign-Offs</div></div><div class="d-stat-card"><div class="sc-num">' + myCenters.length + '</div><div class="sc-label">Centers</div></div><div class="d-stat-card"><div class="sc-num' + (numAwaiting > 0 ? ' orange' : '') + '">' + numAwaiting + '</div><div class="sc-label">Awaiting</div></div><div class="d-stat-card"><div class="sc-num' + (totalFails > 0 ? ' red' : '') + '">' + totalFails + '</div><div class="sc-label">Failed Items</div></div></div>';

  // Detail table of all admin submissions
  var detailTable = '';
  if (adminSubs.length > 0) {
    var rows = adminSubs.map(function(sub, idx) {
      var failItems = [];
      ADMIN_CATEGORIES.forEach(function(cat) {
        cat.items.forEach(function(item) {
          if (sub.checks[item.id] === 'fail') failItems.push({ text: item.text, rule: item.rule, note: (sub.notes[item.id] || '').trim() });
        });
      });
      var pc = (sub.completion || 0) >= 100 ? 'pct-complete' : ((sub.completion || 0) > 0 ? 'pct-partial' : 'pct-empty');
      var hd = failItems.length > 0;
      var isE = dashExpandedRows['a-' + idx];
      var roleLabel = sub.adminRoleLabel || (ADMIN_MODES[sub.adminRole] ? ADMIN_MODES[sub.adminRole].label : 'Admin');
      var row = '<tr><td class="td-center">' + (sub.centerName || '') + '</td><td class="td-teacher">' + (sub.teacherName || '') + '</td><td style="font-size:0.72rem;">' + roleLabel + '</td><td>' + formatDate(sub.inspectionDate) + '</td><td><span class="pct-badge ' + pc + '">' + (sub.completion || 0) + '%</span></td><td class="d-pass-fail"><span class="pf-pass">' + (sub.pass || 0) + 'P</span>/<span class="pf-fail">' + (sub.fail || 0) + 'F</span></td><td>' + (hd ? '<button class="d-expand-btn" onclick="dashToggleRow(\'a-' + idx + '\')">' + (isE ? '▲ Hide' : '▼ Details') + '</button>' : '<span style="font-size:0.72rem;color:var(--brand);">✓ Clean</span>') + '</td></tr>';
      if (isE && hd) {
        var fh = failItems.map(function(fi) { return '<div class="dc-fail-item"><div class="dc-fail-text">' + fi.text + '</div>' + (fi.note ? '<div class="dc-note">📝 ' + fi.note + '</div>' : '') + '</div>'; }).join('');
        row += '<tr class="d-detail-row"><td colspan="7"><div class="d-detail-content"><div class="dc-title">Failed Items</div>' + fh + '</div></td></tr>';
      }
      return row;
    }).join('');
    detailTable = '<div class="d-table-card" style="margin-top:1rem;"><table><thead><tr><th>Center</th><th>Inspector</th><th>Role</th><th>Date</th><th>%</th><th>P/F</th><th>Details</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  return qNav + chips + stats + renderDashCenterFilter() + centerCards + detailTable;
}

}

function addNewUser(){var newId='user_'+Date.now();USERS.push({id:newId,name:'',pin:'',role:'director',centers:[]});saveUsers();editUser(newId);}
function editUser(uid){
  var user=USERS.find(function(u){return u.id===uid;});if(!user||user.role==='owner')return;
  var roleOpts='<option value="director"'+(user.role==='director'?' selected':'')+'>Program Director</option><option value="assistant"'+(user.role==='assistant'?' selected':'')+'>Assistant Director</option><option value="records"'+(user.role==='records'?' selected':'')+'>Children\'s Records</option><option value="hr"'+(user.role==='hr'?' selected':'')+'>Staff Records / HR</option>';
  var centerChecks=CENTERS.map(function(c){var checked=user.centers.indexOf(c.id)!==-1;return '<label class="set-center-check"><input type="checkbox" value="'+c.id+'"'+(checked?' checked':'')+' onchange="toggleUserCenter(\''+uid+'\',\''+c.id+'\',this.checked)"> '+c.name+'</label>';}).join('');
  document.getElementById('modal').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)saveEditAndClose(\''+uid+'\')"><div class="settings-edit-modal"><div class="modal-handle" style="margin:0.5rem auto;"></div><div class="set-header"><h2>'+(user.name?'✏️ Edit '+user.name:'+ New Staff Member')+'</h2><button class="set-close" onclick="saveEditAndClose(\''+uid+'\')">✕</button></div><div class="set-body"><div class="set-form-row"><div class="form-group"><label>Full Name</label><input type="text" id="setEditName" value="'+(user.name||'').replace(/"/g,'&quot;')+'" placeholder="Enter name" oninput="updateUserField(\''+uid+'\',\'name\',this.value)"></div><div class="form-group"><label>4-Digit PIN</label><input type="text" id="setEditPin" value="'+(user.pin||'')+'" placeholder="1234" maxlength="4" inputmode="numeric" oninput="updateUserField(\''+uid+'\',\'pin\',this.value)"></div></div><div class="form-group"><label>Role</label><select onchange="updateUserField(\''+uid+'\',\'role\',this.value)">'+roleOpts+'</select></div><div class="form-group"><label>Assigned Center(s)</label><div class="set-center-list">'+centerChecks+'</div></div></div><div class="set-footer"><button class="set-done-btn" onclick="saveEditAndClose(\''+uid+'\')">Save</button></div></div></div>';
}
function updateUserField(uid,field,val){var user=USERS.find(function(u){return u.id===uid;});if(!user)return;user[field]=val;saveUsers();}
function toggleUserCenter(uid,cid,checked){var user=USERS.find(function(u){return u.id===uid;});if(!user)return;if(checked&&user.centers.indexOf(cid)===-1)user.centers.push(cid);if(!checked)user.centers=user.centers.filter(function(c){return c!==cid;});saveUsers();}
function saveEditAndClose(uid){var user=USERS.find(function(u){return u.id===uid;});if(user&&(!user.name||!user.name.trim())){USERS=USERS.filter(function(u){return u.id!==uid;});saveUsers();openSettings();return;}if(user&&user.pin&&user.pin.length!==4){alert('PIN must be exactly 4 digits.');return;}if(user&&user.centers.length===0&&user.name&&user.name.trim()){alert('Please assign at least one center.');return;}saveUsers();USERS=loadUsers();openSettings();}
function deleteUser(uid){var user=USERS.find(function(u){return u.id===uid;});if(!user||user.role==='owner')return;if(!confirm('Remove '+user.name+'?'))return;USERS=USERS.filter(function(u){return u.id!==uid;});saveUsers();renderSettingsModal();}
function resetUsersToDefault(){if(!confirm('Reset all staff to defaults? Changes will be lost.'))return;USERS=JSON.parse(JSON.stringify(DEFAULT_USERS));saveUsers();renderSettingsModal();}

// ===== INIT =====
if(!state.inspectionDate)state.inspectionDate=new Date().toISOString().split('T')[0];
if(!dashViewQuarter)dashViewQuarter=getDashCurrentQuarter();

// Hub SSO: auto-login to dashboard when opened from Hub
(function(){
  var p = new URLSearchParams(window.location.search);
  var u = p.get('hub_user');
  if (!u) return;
  var ul = u.toLowerCase();
  var m = USERS.find(function(x){ return x.name.toLowerCase() === ul || x.id === ul; });
  if (!m) {
    var r = p.get('hub_role');
    if (r === 'owner' || r === 'admin') m = USERS.find(function(x){ return x.role === 'owner'; });
  }
  if (m) {
    dashUser = m;
    dashFilterCenter = '';
    var hc = p.get('hub_center');
    if (hc) {
      var cm = {peace:'peace', niles:'niles', montessori:'montessori_center'};
      dashFilterCenter = cm[hc] || '';
    }
    dashViewMonth = getDashCurrentMonth();
    dashViewQuarter = getDashCurrentQuarter();
    appMode = 'dashboard';
    try { localStorage.setItem('mi_cc_dash_user', m.id); } catch(e) {}
    _cloudSynced = false;
    cloudLoad(function(){ render(); });
  }
})();
render();
</script>
